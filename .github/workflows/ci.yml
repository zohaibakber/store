name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Server env placeholders
        run: |
          cat > apps/server/.env <<'EOF'
          DATABASE_URL=
          BETTER_AUTH_SECRET=
          BETTER_AUTH_URL=
          AUTH_TRUSTED_ORIGINS=
          ELECTRON_PROTOCOL=
          EOF

      - name: Check (format, lint, typecheck)
        run: bunx vp check

      - name: Workspace checks
        run: bun run check

      - name: Tests
        run: bunx vp test
