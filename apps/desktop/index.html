<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Header CSP pins the API origin where response headers are available; this is the fallback floor for file loads. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: user-image:; font-src 'self' data:; connect-src 'self' https: ws: http://localhost:*; object-src 'none'; base-uri 'self'"
    />
    <title>Tabaaq</title>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f4;
        transition: opacity 0.15s ease-out;
      }
      #app-loading img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }
      #app-loading.app-loading-hidden {
        opacity: 0;
        pointer-events: none;
      }
      @media (prefers-color-scheme: dark) {
        #app-loading {
          background: #0a0a0a;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-loading">
      <img src="/logo.svg" alt="" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
